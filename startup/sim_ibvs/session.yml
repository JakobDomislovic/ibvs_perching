name: ibvs_perching_sim
root: ./
startup_window: ibvs
pre_window: export UAV_NAMESPACE=red
windows:
  - roscore:
      layout: tiled
      panes:
        - roscore
        # GPS_TYPEX=0 in parameters to disable GPS!
        - export SITL_RITW_TERMINAL="tmux new-window -d -n:ardupilot1"; waitForRos;
          roslaunch ardupilot_gazebo sim_vehicle.launch
          enable_console:=false
          additional_arguments:="--no-rebuild"
        - waitForRos; rosparam set use_sim_time true; roslaunch ardupilot_gazebo mavros.launch
  - gazebo:
      layout: tiled
      panes:
        # custom kopterworx xacro: down-facing camera directly under the base
        # (stock down_facing_camera hangs 0.3 m low / 0.2 m left -- it would
        # touch the tag at the 0.3 m target altitude)
        # spawn 1 m away from the tag (which sits at the world origin) so the
        # camera doesn't start on top of it and the alignment is visible
        - waitForRos; roslaunch ardupilot_gazebo kopterworx.launch
          use_sim_time:=true
          x:=0.0 y:=0.0
          camera_pose:=down_facing_camera
          model:=$(rospack find ibvs_perching)/urdf/kopterworx_downcam.urdf.xacro
  - visualization:
      layout: tiled
      panes:
        # IBVS command signals: body rates, thrust/climb-rate, tag error, altitude
        - history -s "rosrun plotjuggler plotjuggler -l $(rospack find ibvs_perching)/config/plotjuggler_ibvs.xml"
        - history -s "rosrun rviz rviz -d $(rospack find perching_uav)/config/rviz_sim_jd.rviz"
        - history -s "rosrun rqt_image_view rqt_image_view /$UAV_NAMESPACE/ibvs/debug_image"
  - ibvs:
      layout: tiled
      panes:
        # NOTE: on purpose we do NOT launch uav_ros_control's
        # control_manager_nodelet (tracker/controller) here -- ibvs_controller
        # talks to mavros/setpoint_raw/attitude directly.
        #
        # GUID_OPTIONS must be 0 so ArduPilot interprets AttitudeTarget.thrust
        # as a CLIMB RATE (0.5 = hover). The kopterworx identity.parm ships
        # with GUID_OPTIONS=8 (raw thrust, for the uav_ros_stack MPC) which
        # makes this controller fly away!
        - waitForRos; waitForSysStatus; rosrun mavros mavparam -n $UAV_NAMESPACE/mavros set GUID_OPTIONS 0;
          roslaunch ibvs_perching ibvs_perching.launch
        # STEP 1 -- takeoff: sets GUIDED_NOGPS, arms, climbs, then HOLDS position
        - history -s "rosservice call /$UAV_NAMESPACE/ibvs/takeoff"
        # STEP 2 -- start aligning toward the tag (ibvs/stop returns to hover)
        - history -s "rosservice call /$UAV_NAMESPACE/ibvs/start"
        - history -s "rosservice call /$UAV_NAMESPACE/ibvs/stop"
        - history -s "rosservice call /$UAV_NAMESPACE/mavros/cmd/arming false"
        - history -s "./../../bags/bagger.sh"
        # rehearse the REAL-WORLD flow (see startup/real_world): kill the
        # launch pane above, press up here to relaunch with the rw config
        # (engage_on_target), then fly manually from the joystick window --
        # the first tag detection engages GUIDED_NOGPS by itself
        - history -s "roslaunch ibvs_perching ibvs_perching.launch config:=$(rospack find ibvs_perching)/startup/real_world/custom_config/ibvs_params_rw.yaml"
  - joystick:
      layout: tiled
      panes:
        # keyboard "RC transmitter" for SITL -- flies through mavros/rc/override,
        # GRABS THE KEYBOARD in this pane, so start it yourself (press up):
        # o = arm, 2 = ALT_HOLD, w = climb, arrows = roll/pitch, a/d = yaw,
        # 2 mid-align = safety-pilot takeover, g = hand back, q = quit
        - history -s "rosrun ibvs_perching keyboard_rc.py __ns:=$UAV_NAMESPACE"
        # same RC->joy bridge as the real vehicle (reads mavros/rc/in, which
        # reflects the overrides) -- /$UAV_NAMESPACE/joy works in sim too
        - waitForRos; waitForMavros; roslaunch uav_ros_general rc_to_joy.launch
        - waitForRos; rostopic echo /$UAV_NAMESPACE/joy
  - status:
      layout: tiled
      panes:
        - waitForRos; rostopic echo /$UAV_NAMESPACE/mavros/state
        - waitForRos; rostopic echo /$UAV_NAMESPACE/ibvs/state
        - waitForRos; rostopic echo /$UAV_NAMESPACE/ibvs/target_point
        - waitForRos; rostopic echo /$UAV_NAMESPACE/mavros/setpoint_raw/attitude
        - waitForRos; rostopic echo /$UAV_NAMESPACE/mavros/local_position/odom
