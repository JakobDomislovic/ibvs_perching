name: ibvs_perching_rw
root: ./
startup_window: ibvs
pre_window: export UAV_NAMESPACE=red && source <%= @settings["setup_name"] %>
windows:
  - roscore:
      layout: tiled
      panes:
        - roscore
        # mavros straight from ibvs_perching (config/apm_config.yaml) --
        # no uav_ros_stack needed. FCU_URL comes from rw_setup.sh.
        - waitForRos; roslaunch ibvs_perching mavros_apm.launch fcu_url:=$FCU_URL
        - waitForRos; waitForMavros; sleep 10; rosrun mavros mavsys -n $UAV_NAMESPACE/mavros rate --all 50
  - camera:
      layout: tiled
      panes:
        # the vision module (aruco_detector) subscribes to
        #   /$UAV_NAMESPACE/camera/color/image_raw + camera/color/camera_info
        # -- adapt this pane to the camera actually mounted on the UAV
        - history -s "ROS_NAMESPACE=$UAV_NAMESPACE roslaunch realsense2_camera rs_camera.launch"
        - history -s "rosrun rqt_image_view rqt_image_view /$UAV_NAMESPACE/ibvs/debug_image"
  - joystick:
      layout: tiled
      panes:
        # RC -> joy bridge, same as perching_uav/startup/rw; RC_MAPPING is
        # exported in rw_setup.sh (channel mapping per transmitter)
        - waitForRos; roslaunch uav_ros_general rc_to_joy.launch
          mapping_file:=$RC_MAPPING
        - waitForRos; rostopic echo /$UAV_NAMESPACE/joy
  - ibvs:
      layout: tiled
      panes:
        # REAL-WORLD FLOW (engage_on_target: true, no position_hold service):
        #   1. safety pilot takes off MANUALLY (STABILIZE) and flies to the area
        #   2. the first point published on /$UAV_NAMESPACE/ibvs/target_point
        #      (tag detection, or a manually chosen point) makes the controller
        #      switch the FCU to GUIDED_NOGPS itself and start servoing
        #   3. the safety pilot can ALWAYS take back control with the RC mode
        #      switch; the controller never re-takes the mode on its own --
        #      flip the RC switch back to GUIDED_NOGPS to re-engage, or call
        #      ibvs/start to allow the next target point to engage again
        #
        # GUID_OPTIONS must be 0 so ArduPilot interprets AttitudeTarget.thrust
        # as a CLIMB RATE (0.5 = hover). GUID_OPTIONS=8 (raw thrust, used for
        # the uav_ros_stack MPC) makes this controller fly away!
        - waitForRos; waitForSysStatus; rosrun mavros mavparam -n $UAV_NAMESPACE/mavros set GUID_OPTIONS 0;
          roslaunch ibvs_perching ibvs_perching.launch
          config:=$(pwd)/custom_config/ibvs_params_rw.yaml
          spawn_ar_tag:=false
        # engagement smoke test: an all-zero point engages GUIDED_NOGPS; it
        # goes stale within tag_timeout, so the vehicle just HOLDS position
        # (this is the position_hold replacement -- fly, publish, hands off)
        - history -s "rostopic pub --once /$UAV_NAMESPACE/ibvs/target_point geometry_msgs/PointStamped '{}'"
        - history -s "rosservice call /$UAV_NAMESPACE/ibvs/stop"
        - history -s "rosservice call /$UAV_NAMESPACE/ibvs/start"
        - history -s "rosservice call /$UAV_NAMESPACE/mavros/cmd/arming false"
  - status:
      layout: tiled
      panes:
        - waitForRos; rostopic echo /$UAV_NAMESPACE/mavros/state
        - waitForRos; rostopic echo /$UAV_NAMESPACE/ibvs/state
        - waitForRos; rostopic echo /$UAV_NAMESPACE/ibvs/target_point
        - waitForRos; rostopic echo /$UAV_NAMESPACE/mavros/setpoint_raw/attitude
        - waitForRos; rostopic echo /$UAV_NAMESPACE/mavros/rc/in
